name: Code Coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
      - cron: '0 0 * * *'  # This runs the workflow every day at midnight UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Retry transient crates.io download failures and avoid HTTP/2 "unexpected eof" errors.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

# Generate code coverage using llvm-cov. The suite is hermetic (fake backend), so unlike the
# sister library repo this job needs NO FalkorDB service container.
jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: taiki-e/install-action@88ada01c46e65c47040a0ae865537cc76fcd0e1c # just, cargo-llvm-cov, nextest
        with:
          tool: just,cargo-llvm-cov,nextest

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Cache only dependency sources (registry/git), not target/ or ~/.cargo/bin:
          # avoids a crates.io refetch that can flake, with no stale-artifact risk.
          cache-targets: "false"
          cache-bin: "false"

      - name: Generate Code Coverage
        run: just coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: codecov.json
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
